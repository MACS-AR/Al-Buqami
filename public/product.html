<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج - مؤسسة البقمي</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="loading-screen"><div class="spinner"></div></div>

    <header>
        <nav class="navbar">
            <div class="logo-container">
                <a href="index.html"><img src="https://raw.githubusercontent.com/MACS-AR/Al-Buqami/refs/heads/main/public/assets/logo1.png" alt="البقمي"></a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="services.html">الخدمات التقنية</a></li>
                <li><a href="products.html">المتجر الرقمي</a></li>
                <li><a href="invoice.html">الفاتورة الإلكترونية</a></li>
                <li><a href="admin.html">لوحة التحكم</a></li>
            </ul>
        </nav>
    </header>

    <main style="padding: 120px 5% 60px; max-width: 1400px; margin: 0 auto; min-height: 80vh;">
        
        <div style="display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 50px; flex-wrap: wrap;" id="product-detail-wrapper">
            <!-- Product Images -->
            <div>
                <div class="glass-panel" style="padding: 20px; text-align: center; margin-bottom: 20px;">
                    <img id="main-product-img" src="" style="max-width: 100%; height: 400px; object-fit: contain; border-radius: 12px;" alt="">
                </div>
                <div id="product-thumbnails-container" style="display: flex; gap: 10px; overflow-x: auto;">
                    <!-- Thumbnails dynamic -->
                </div>
            </div>

            <!-- Product Data -->
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <span id="product-badge" class="glass-panel" style="padding: 6px 15px; color: var(--gold); align-self: flex-start; font-weight: 700; font-size: 0.85rem;"></span>
                <h1 id="product-name" style="font-size: 2.5rem; font-weight: 900;"></h1>
                
                <div style="display: flex; align-items: center; gap: 20px;">
                    <div id="product-rating-stars" style="color: var(--gold);"></div>
                    <span id="product-sku" style="color: var(--text-muted); font-size: 0.9rem;"></span>
                </div>

                <div style="display: flex; align-items: baseline; gap: 15px; margin: 15px 0;">
                    <span id="product-price" style="font-size: 2.2rem; font-weight: 900; color: var(--gold);"></span>
                    <span id="product-old-price" style="text-decoration: line-through; color: var(--text-muted); font-size: 1.3rem;"></span>
                </div>

                <p id="product-description" style="color: var(--text-muted); line-height: 1.8; font-size: 1.05rem;"></p>

                <div style="border-top: 1px solid var(--glass-border); padding-top: 20px; margin-top: 10px;">
                    <p style="margin-bottom: 10px;"><strong>الضمان المعتمد:</strong> <span id="product-warranty" style="color: #2ecc71;"></span></p>
                    <p style="margin-bottom: 20px;"><strong>حالة المخزون:</strong> <span id="product-status" style="color: var(--gold);"></span></p>
                </div>

                <div style="display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap;">
                    <button class="btn-gold" id="btn-add-to-cart-page" style="flex: 1; justify-content: center; padding: 15px;"><i class="fa-solid fa-basket-shopping"></i> إضافة إلى السلة</button>
                    <button class="btn-outline" id="btn-add-to-wishlist-page" style="padding: 15px 25px;"><i class="fa-regular fa-heart"></i></button>
                </div>
            </div>
        </div>

        <!-- Specifications Tab / Reviews -->
        <section class="glass-panel" style="padding: 40px; margin-top: 60px;">
            <h2 style="color: var(--gold); border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; margin-bottom: 25px;">المواصفات الفنية والميزات للحل الذكي</h2>
            <p id="product-specs" style="line-height: 1.8; white-space: pre-line; color: var(--text-muted);"></p>
        </section>

    </main>

    <footer>
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; max-width: 1400px; margin: 0 auto;">
            <p>© 2026 مؤسسة البقمي للحلول الذكية. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script type="module">
        import { db, ref, get, child, showToast } from "./assets/js/firebase.js";
        import { updateGlobalBadges } from "./assets/js/app.js";

        document.getElementById("loading-screen").style.display = "none";

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (!productId) {
            window.location.href = "products.html";
        }

        let currentProduct = null;

        get(child(ref(db), `products/${productId}`)).then((snapshot) => {
            if (snapshot.exists()) {
                const p = snapshot.val();
                currentProduct = p;
                currentProduct.id = productId;

                document.getElementById('product-name').textContent = p.name;
                document.getElementById('product-badge').textContent = getCategoryName(p.category);
                document.getElementById('product-sku').textContent = `رقم المنتج: ${p.sku || productId.substring(0, 8).toUpperCase()}`;
                document.getElementById('product-price').textContent = `${p.price} ر.س`;
                
                if (p.oldPrice && parseFloat(p.oldPrice) > parseFloat(p.price)) {
                    document.getElementById('product-old-price').textContent = `${p.oldPrice} ر.س`;
                }

                document.getElementById('product-description').textContent = p.description;
                document.getElementById('product-specs').textContent = p.specs || "لا توجد مواصفات فنية إضافية.";
                document.getElementById('product-warranty').textContent = p.warranty || "سنتين على الأعطال الفنية";
                document.getElementById('product-status').textContent = parseInt(p.qty) > 0 ? "متوفر حالياً" : "غير متوفر - طلب مسبق";
                
                const mainImg = document.getElementById('main-product-img');
                mainImg.src = p.imageUrl || "https://via.placeholder.com/600x400?text=No+Image";
                mainImg.alt = p.name;

                // Simple static rating stars
                document.getElementById('product-rating-stars').innerHTML = `
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <span style="color:#aaa; margin-right: 10px;">(التقييمات مخصصة للعملاء المشترين)</span>
                `;

            } else {
                showToast("المنتج غير متوفر حالياً.", "error");
                setTimeout(() => window.location.href = "products.html", 2000);
            }
        });

        function getCategoryName(cat) {
            const map = { tracking: "أجهزة تتبع", security: "أنظمة حماية", iot: "إنترنت أشياء" };
            return map[cat] || "أجهزة وحلول ذكية";
        }

        // Add to cart
        document.getElementById('btn-add-to-cart-page').addEventListener('click', () => {
            if (!currentProduct) return;
            let cart = JSON.parse(localStorage.getItem("albuqami_cart")) || [];
            const idx = cart.findIndex(item => item.id === currentProduct.id);
            if (idx > -1) {
                cart[idx].quantity += 1;
            } else {
                cart.push({
                    id: currentProduct.id,
                    name: currentProduct.name,
                    price: parseFloat(currentProduct.price),
                    image: currentProduct.imageUrl,
                    quantity: 1
                });
            }
            localStorage.setItem("albuqami_cart", JSON.stringify(cart));
            updateGlobalBadges();
            showToast("تمت إضافة المنتج إلى سلة المشتريات بنجاح!", "success");
        });

        // Add to wishlist
        document.getElementById('btn-add-to-wishlist-page').addEventListener('click', () => {
            if (!currentProduct) return;
            let wishlist = JSON.parse(localStorage.getItem("albuqami_wishlist")) || [];
            if (!wishlist.includes(currentProduct.id)) {
                wishlist.push(currentProduct.id);
                localStorage.setItem("albuqami_wishlist", JSON.stringify(wishlist));
                updateGlobalBadges();
                showToast("تمت الإضافة للمفضلة", "success");
            } else {
                showToast("المنتج موجود بالفعل بالمفضلة", "error");
            }
        });
    </script>
</body>
</html>
