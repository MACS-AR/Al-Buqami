<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة تسجيل الدخول - مؤسسة البقمي</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="loading-screen"><div class="spinner"></div></div>

    <section style="min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;">
        <div class="glass-panel" style="width: 100%; max-width: 450px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.7);">
            <div style="text-align: center; margin-bottom: 30px;">
                <img src="https://raw.githubusercontent.com/MACS-AR/Al-Buqami/refs/heads/main/public/assets/logo1.png" style="height: 70px; margin-bottom: 15px;" alt="البقمي">
                <h2 style="font-weight: 800; color: #fff;">بوابة الدخول <span>الآمنة</span></h2>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">ادخل لوحة التحكم أو حسابك التجاري</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label><i class="fa-regular fa-envelope"></i> البريد الإلكتروني</label>
                    <input type="email" id="login-email" class="form-control" required placeholder="admin@albuqami.com">
                </div>
                <div class="form-group" style="margin-bottom: 30px;">
                    <label><i class="fa-solid fa-lock"></i> كلمة المرور</label>
                    <input type="password" id="login-password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-gold" style="width: 100%; justify-content: center; padding: 14px;">تسجيل الدخول</button>
            </form>
        </div>
    </section>

    <script type="module">
        import { auth, signInWithEmailAndPassword, showToast } from "./assets/js/firebase.js";
        
        document.getElementById("loading-screen").style.display = "none";

        document.getElementById("login-form").addEventListener("submit", (e) => {
            e.preventDefault();
            const email = document.getElementById("login-email").value.trim();
            const pass = document.getElementById("login-password").value.trim();
            
            signInWithEmailAndPassword(auth, email, pass)
                .then((userCredential) => {
                    showToast("تم تسجيل الدخول بنجاح! جاري تحويلك لوحة الإدارة...", "success");
                    setTimeout(() => {
                        window.location.href = "admin.html";
                    }, 1500);
                })
                .catch((error) => {
                    showToast("خطأ في البيانات! تأكد من البريد الإلكتروني وكلمة المرور.", "error");
                });
        });
    </script>
</body>
</html>
