<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Page 13 - Signatures</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; padding: 25mm 20mm; width: 210mm; height: 297mm; box-sizing: border-box; }
        .header { display: flex; justify-content: flex-end; } .header img { height: 18mm; }
        .content { margin-top: 15mm; line-height: 1.8; font-size: 16px; text-align: center; }
        .title { font-size: 22px; font-weight: bold; color: #d4af37; border-bottom: 2px solid #121212; padding-bottom: 5px; margin-bottom: 15mm; text-align: right; }
        .sig-container { display: flex; justify-content: space-between; margin-top: 30mm; padding: 0 10mm; }
        .sig-box { border-top: 2px dashed #333; width: 50mm; padding-top: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><img id="dynamicLogo" src="" alt="Logo"></div>
    <div class="content">
        <div class="title">اعتماد وقبول العرض المالي</div>
        <p>نشكر لكم ثقتكم الدائمة بنا، ونتطلع للعمل سوياً لتقديم أفضل الحلول التقنية المستدامة لأعمالكم.</p>
        
        <div class="sig-container">
            <div class="sig-box">اعتماد الطرف الأول<br>(الشركة المقدمة للخدمة)</div>
            <div class="sig-box">اعتماد الطرف الثاني<br>(العميل المكرم)</div>
        </div>
    </div>
    <script>
        window.addEventListener('message', function(e) { if (e.data.type === 'RENDER_DATA') document.getElementById('dynamicLogo').src = e.data.logoUrl || ''; });
    </script>
</body>
</html>
