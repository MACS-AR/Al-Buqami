<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title-meta">مؤسسة البقمي للحلول الذكية وإنترنت الأشياء</title>
    <meta name="description" content="منصة متكاملة لبيع أجهزة التتبع الذكية، أنظمة الحماية، وحلول إنترنت الأشياء والتحكم بالمركبات والأجهزة.">
    
    <!-- Fonts & FontAwesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0B0B0C;
            --bg-card: rgba(15, 15, 17, 0.75);
            --gold: #D4AF37;
            --gold-hover: #AA7C11;
            --white: #FFFFFF;
            --gray-light: #E0E0E0;
            --gray-muted: #888888;
            --border-gold: rgba(212, 175, 55, 0.15);
            --font-main: 'Cairo', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--white);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Glass UI Styles */
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            transition: var(--transition);
        }

        .glass-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-5px);
        }

        /* Typography & Buttons */
        .gold-text { color: var(--gold) !important; }
        
        .gold-btn {
            background: linear-gradient(135deg, var(--gold), #F3E5AB);
            color: #050505;
            font-weight: 700;
            padding: 12px 28px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .gold-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(214, 175, 55, 0.4);
        }

        .gold-btn-outline {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            font-weight: 700;
            padding: 10px 26px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .gold-btn-outline:hover {
            background: var(--gold);
            color: #050505;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
            display: flex; justify-content: center; align-items: center;
            z-index: 99999;
            transition: opacity 0.5s ease;
        }

        .loader {
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .loader-ring {
            width: 70px; height: 70px;
            border: 4px solid var(--bg-dark);
            border-top: 4px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Toast Notifications */
        #toast-container {
            position: fixed; bottom: 25px; left: 25px; z-index: 99999;
            display: flex; flex-direction: column; gap: 10px;
        }

        .toast {
            background: rgba(11, 11, 12, 0.95);
            border-right: 5px solid var(--gold);
            padding: 15px 25px;
            border-radius: 6px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Header / Navigation */
        nav {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 999;
            background: rgba(11, 11, 12, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-gold);
        }

        .nav-container {
            max-width: 1300px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px;
        }

        .logo {
            display: flex; align-items: center; gap: 10px;
            font-size: 22px; font-weight: 800; text-decoration: none; color: var(--white);
        }

        .logo img {
            height: 45px; width: auto; max-width: 150px; object-fit: contain;
        }

        .nav-links {
            list-style: none; display: flex; gap: 20px; align-items: center;
        }

        .nav-links a {
            color: var(--white); text-decoration: none; font-weight: 600; font-size: 14px; transition: var(--transition);
        }

        .nav-links a:hover { color: var(--gold); }

        .nav-right { display: flex; align-items: center; gap: 15px; }

        .cart-trigger {
            background: none; border: none; color: var(--white); font-size: 22px; cursor: pointer; position: relative;
        }

        .cart-count {
            position: absolute; top: -8px; right: -8px; background: var(--gold); color: #000;
            font-size: 11px; font-weight: 800; width: 18px; height: 18px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
        }

        /* Hero Banner */
        .hero-banner {
            margin-top: 80px; height: 50vh; background-size: cover; background-position: center;
            position: relative; display: flex; align-items: center; justify-content: center; text-align: center;
        }

        .hero-banner::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 11, 12, 0.75);
        }

        .hero-content { position: relative; z-index: 5; max-width: 800px; padding: 20px; }
        .hero-content h1 { font-size: 38px; font-weight: 800; margin-bottom: 10px; }

        /* Store Layout */
        .store-container {
            max-width: 1300px; margin: 40px auto; display: grid; grid-template-columns: 280px 1fr; gap: 30px; padding: 0 20px;
        }

        .sidebar-filters { height: fit-content; padding: 20px; }
        .sidebar-filters h3 { margin-bottom: 20px; border-bottom: 2px solid var(--gold); padding-bottom: 8px; }
        
        .filter-item { margin-bottom: 20px; }
        .filter-item label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        .filter-item input, .filter-item select {
            width: 100%; padding: 10px; background: #141416; border: 1px solid var(--border-gold);
            border-radius: 8px; color: var(--white); outline: none; font-size: 14px;
        }

        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;
        }

        /* Product Card */
        .product-card {
            display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; padding: 15px;
        }

        .prod-img-container {
            width: 100%; height: 200px; border-radius: 10px; overflow: hidden; position: relative; background: #141416;
        }

        .prod-img-container img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
        .product-card:hover .prod-img-container img { transform: scale(1.08); }

        .discount-tag {
            position: absolute; top: 10px; right: 10px; background: #E03E3E; color: #fff;
            padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;
        }

        .prod-details { margin-top: 15px; }
        .prod-details h4 { font-size: 16px; font-weight: 700; margin-bottom: 8px; height: 48px; overflow: hidden; }
        
        .prod-price-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .prod-price-row .new-price { font-size: 18px; font-weight: 800; color: var(--gold); }
        .prod-price-row .old-price { font-size: 13px; text-decoration: line-through; color: var(--gray-muted); }

        /* Detail/Social View Modal */
        .modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
            opacity: 0; pointer-events: none; transition: var(--transition); padding: 15px;
        }

        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { width: 100%; max-width: 850px; max-height: 90vh; overflow-y: auto; padding: 30px; }
        .close-modal-btn { float: left; font-size: 28px; cursor: pointer; color: var(--gold); }

        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px; }
        .gallery-main { width: 100%; height: 280px; border-radius: 10px; overflow: hidden; background: #141416; }
        .gallery-main img { width: 100%; height: 100%; object-fit: contain; }
        
        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #121214 25%, #1D1D21 50%, #121214 75%);
            background-size: 200% 100%; animation: skeleton-load 1.5s infinite; border-radius: 12px; height: 350px;
        }
        @keyframes skeleton-load { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Sliding Cart Drawer */
        .cart-drawer {
            position: fixed; top: 0; left: -400px; width: 380px; height: 100vh;
            background: var(--bg-dark); border-right: 2px solid var(--gold); z-index: 10000;
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .cart-drawer.active { left: 0; }
        .cart-items-box { flex-grow: 1; overflow-y: auto; margin: 20px 0; }
        
        .cart-item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Invoice Screen Styles */
        #invoice-screen { display: none; padding: 40px 20px; background: #F8F9FA; color: #1a1a1a; min-height: 100vh; }
        .invoice-box { max-width: 800px; margin: 40px auto; background: #FFF; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .invoice-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .invoice-table th, .invoice-table td { padding: 12px; border-bottom: 1px solid #E0E0E0; text-align: right; }

        /* Responsive */
        @media (max-width: 991px) {
            .store-container { grid-template-columns: 1fr; }
            .detail-grid { grid-template-columns: 1fr; }
            .cart-drawer { width: 100%; left: -100%; }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader">
            <div class="loader-ring"></div>
            <span class="gold-text" style="font-weight: 700;">منصة البقمي للحلول الذكية</span>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <!-- Navigation Bar -->
    <nav>
        <div class="nav-container">
            <a href="#" class="logo" id="site-logo-link">
                <!-- سيتم استبداله باللوجو من الفايربيس ديناميكياً -->
                <i class="fa-solid fa-microchip gold-text"></i> <span id="site-name-display">البقمي IoT</span>
            </a>
            <ul class="nav-links">
                <li><a href="#" onclick="showHomeView()">الرئيسية والمتجر</a></li>
                <li><a href="admin.html" class="gold-btn-outline" style="padding: 5px 15px; font-size: 13px;">لوحة الإدارة</a></li>
            </ul>
            <div class="nav-right">
                <button class="cart-trigger" onclick="toggleCart(true)">
                    <i class="fa-solid fa-shopping-basket"></i>
                    <span class="cart-count" id="cart-counter">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- MAIN CUSTOMER INTERFACE VIEW -->
    <div id="customer-main-view">
        <!-- Banner Section -->
        <header class="hero-banner" id="hero-bg-section" style="background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1200&q=80');">
            <div class="hero-content">
                <h1 id="banner-title">حلول تتبع ذكية وإنترنت الأشياء بأعلى جودة</h1>
                <p id="banner-desc">تصفح متجرنا الحصري لشراء أحدث الأجهزة الفنية وتصميم اللوحات الإلكترونية</p>
            </div>
        </header>

        <!-- Store Area -->
        <div class="store-container">
            <!-- Filters -->
            <aside class="sidebar-filters glass-card">
                <h3>تصفية المنتجات</h3>
                <div class="filter-item">
                    <label>البحث السريع</label>
                    <input type="text" id="search-input" placeholder="اكتب اسم المنتج...">
                </div>
                <div class="filter-item">
                    <label>القسم</label>
                    <select id="category-filter">
                        <option value="all">جميع الأقسام</option>
                        <option value="tracking">أجهزة التتبع</option>
                        <option value="security">أجهزة الحماية والإنذار</option>
                        <option value="iot">حلول إنترنت الأشياء IoT</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>الترتيب حسب</label>
                    <select id="sort-filter">
                        <option value="newest">الأحدث أولاً</option>
                        <option value="price-asc">السعر: من الأقل إلى الأعلى</option>
                        <option value="price-desc">السعر: من الأعلى إلى الأقل</option>
                    </select>
                </div>
            </aside>

            <!-- Grid Items -->
            <main>
                <div class="products-grid" id="products-render-area">
                    <!-- Skeletons loaded via JS before Firebase fetch -->
                    <div class="skeleton"></div>
                    <div class="skeleton"></div>
                    <div class="skeleton"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- PRODUCT DETAILS MODAL VIEW -->
    <div class="modal" id="details-modal">
        <div class="modal-content glass-card">
            <span class="close-modal-btn" onclick="toggleDetailsModal(false)">&times;</span>
            <div id="modal-product-data">
                <!-- Dynamically Rendered Details -->
            </div>
        </div>
    </div>

    <!-- CART DRAWER -->
    <div class="cart-drawer" id="cart-drawer">
        <div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>سلة الشراء</h3>
                <span style="font-size: 24px; cursor: pointer;" onclick="toggleCart(false)">&times;</span>
            </div>
            <div class="cart-items-box" id="cart-items-container">
                <p style="text-align: center; color: var(--gray-muted);">السلة فارغة حالياً.</p>
            </div>
        </div>
        <div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 700;">
                <span>المجموع الفرعي:</span>
                <span id="cart-total-display">0.00 ر.س</span>
            </div>
            <button class="gold-btn w-100" id="checkout-btn" style="width: 100%; justify-content: center;" onclick="openCheckoutForm()">طلب وتأكيد الشراء</button>
        </div>
    </div>

    <!-- CHECKOUT MODAL -->
    <div class="modal" id="checkout-modal">
        <div class="modal-content glass-card" style="max-width: 550px;">
            <span class="close-modal-btn" onclick="toggleCheckoutModal(false)">&times;</span>
            <h2 style="margin-bottom: 20px;">تفاصيل الشحن والتوصيل</h2>
            <form id="checkout-form" onsubmit="processOrder(event)">
                <div class="filter-item">
                    <label>الاسم بالكامل</label>
                    <input type="text" id="cust-name" required placeholder="مثال: عبدالله البقمي">
                </div>
                <div class="filter-item">
                    <label>رقم الجوال</label>
                    <input type="tel" id="cust-phone" required placeholder="05xxxxxxxx" pattern="[0-5][0-9]{8}">
                </div>
                <div class="filter-item">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="cust-email" required placeholder="mail@example.com">
                </div>
                <div class="filter-item">
                    <label>المدينة</label>
                    <input type="text" id="cust-city" required placeholder="مثال: الرياض">
                </div>
                <div class="filter-item">
                    <label>العنوان بالكامل</label>
                    <input type="text" id="cust-address" required placeholder="الشارع، الحي، رقم المنزل">
                </div>
                <button type="submit" class="gold-btn" style="width: 100%; justify-content: center;">إرسال الطلب الآن</button>
            </form>
        </div>
    </div>

    <!-- INVOICE SCREEN (For Printing) -->
    <div id="invoice-screen">
        <div class="invoice-box" id="invoice-paper-content">
            <!-- Rendered Dynamically -->
        </div>
        <div style="text-align: center; margin-top: 20px;" class="no-print">
            <button class="gold-btn" onclick="window.print()"><i class="fa-solid fa-print"></i> طباعة الفاتورة الإلكترونية</button>
            <button class="gold-btn-outline" onclick="showHomeView()">العودة للمتجر</button>
        </div>
    </div>

    <!-- Firebase SDK Modular Import -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, set, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ==========================================
        // تكوين قاعدة بيانات FIREBASE الخاصة بك
        // يمكنك إدخال مفاتيحك مباشرة هنا
        // ==========================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let activeProducts = [];
        let cart = [];

        // Toast Messages Helper
        window.showToast = function(message) {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3500);
        };

        // Screen Loader handling
        window.addEventListener("DOMContentLoaded", async () => {
            await loadSiteSettings();
            await fetchProducts();
            const loader = document.getElementById("loading-screen");
            loader.style.opacity = "0";
            setTimeout(() => { loader.style.display = "none"; }, 500);
        });

        // Load Global Settings
        async function loadSiteSettings() {
            try {
                const settingsRef = ref(db, "siteSettings");
                const snap = await get(settingsRef);
                if (snap.exists()) {
                    const data = snap.val();
                    if (data.logoUrl) {
                        document.getElementById("site-logo-link").innerHTML = `<img src="${data.logoUrl}" alt="Logo">`;
                    }
                    if (data.siteName) {
                        document.getElementById("site-name-display").innerText = data.siteName;
                        document.getElementById("site-title-meta").innerText = data.siteName;
                    }
                    if (data.heroBannerUrl) {
                        document.getElementById("hero-bg-section").style.backgroundImage = `url('${data.heroBannerUrl}')`;
                    }
                    if (data.heroTitle) document.getElementById("banner-title").innerText = data.heroTitle;
                    if (data.heroDesc) document.getElementById("banner-desc").innerText = data.heroDesc;
                }
            } catch(e) { console.log("Firebase config simulation mode activated."); }
        }

        // Fetch Products from Realtime Database
        async function fetchProducts() {
            const renderArea = document.getElementById("products-render-area");
            try {
                const pRef = ref(db, "products");
                const snap = await get(pRef);
                if (snap.exists()) {
                    activeProducts = Object.entries(snap.val()).map(([key, val]) => ({ id: key, ...val }));
                    renderProducts(activeProducts);
                } else {
                    renderArea.innerHTML = `<p style='grid-column: 1/-1; text-align:center; color:var(--gold);'>لا توجد منتجات معروضة حالياً، يمكنك إضافتها من لوحة التحكم.</p>`;
                }
            } catch (err) {
                // Fallback simulation
                activeProducts = [
                    { id: "demo1", sku: "SKU-909", name: "جهاز تتبع الشاحنات GPS SIM7600 4G", price: 549, oldPrice: 650, category: "tracking", qty: 10, images: "https://images.unsplash.com/photo-1580273916550-e323be2ae537?auto=format&fit=crop&w=600&q=80", desc: "جهاز احترافي يعمل على شبكة الجيل الرابع." },
                    { id: "demo2", sku: "SKU-808", name: "لوحة تحكم ذكية ESP32 Smart IoT Board", price: 320, category: "iot", qty: 5, images: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=600&q=80", desc: "لوحة تطوير متكاملة للتحكم بجهد الأجهزة والمحركات برمجياً." }
                ];
                renderProducts(activeProducts);
            }
        }

        // Render Cards
        function renderProducts(productsList) {
            const renderArea = document.getElementById("products-render-area");
            renderArea.innerHTML = "";
            productsList.forEach(p => {
                const discount = p.oldPrice ? Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100) : 0;
                renderArea.innerHTML += `
                    <div class="glass-card product-card">
                        <div class="prod-img-container">
                            ${discount > 0 ? `<div class="discount-tag">خصم ${discount}%</div>` : ""}
                            <img src="${p.images || 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=600&q=80'}" alt="${p.name}">
                        </div>
                        <div class="prod-details">
                            <span class="gold-text" style="font-size: 11px; text-transform: uppercase;">${p.category}</span>
                            <h4>${p.name}</h4>
                            <div class="prod-price-row">
                                <span class="new-price">${p.price} ر.س</span>
                                ${p.oldPrice ? `<span class="old-price">${p.oldPrice} ر.س</span>` : ""}
                            </div>
                            <div style="display:flex; gap:10px;">
                                <button class="gold-btn-outline" style="flex:1;" onclick="viewProductDetails('${p.id}')">تفاصيل</button>
                                <button class="gold-btn" onclick="addToCart('${p.id}')"><i class="fa-solid fa-cart-plus"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Live Filters Implementation
        document.getElementById("search-input").addEventListener("input", filterNow);
        document.getElementById("category-filter").addEventListener("change", filterNow);
        document.getElementById("sort-filter").addEventListener("change", filterNow);

        function filterNow() {
            let filtered = [...activeProducts];
            const search = document.getElementById("search-input").value.toLowerCase();
            const category = document.getElementById("category-filter").value;
            const sort = document.getElementById("sort-filter").value;

            if (search) {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(search) || (p.sku && p.sku.toLowerCase().includes(search)));
            }
            if (category !== "all") {
                filtered = filtered.filter(p => p.category === category);
            }
            if (sort === "price-asc") {
                filtered.sort((a,b) => a.price - b.price);
            } else if (sort === "price-desc") {
                filtered.sort((a,b) => b.price - a.price);
            } else {
                filtered.reverse(); // Newest
            }
            renderProducts(filtered);
        }

        // Product details modal renderer
        window.viewProductDetails = function(id) {
            const prod = activeProducts.find(p => p.id === id);
            if(!prod) return;
            const container = document.getElementById("modal-product-data");
            container.innerHTML = `
                <div class="detail-grid">
                    <div class="gallery-main">
                        <img src="${prod.images}" alt="Product">
                    </div>
                    <div>
                        <span class="gold-text">رمز السلعة: ${prod.sku || 'N/A'}</span>
                        <h2 style="margin: 15px 0;">${prod.name}</h2>
                        <div class="prod-price-row">
                            <span class="new-price" style="font-size: 26px;">${prod.price} ر.س</span>
                        </div>
                        <p style="color: var(--gray-light); margin-bottom: 20px;">${prod.desc || 'لا يوجد وصف للمنتج حالياً.'}</p>
                        <p style="font-size:13px; color:var(--gray-muted); margin-bottom:20px;">الضمان والمواصفات: ${prod.specs || 'ضمان سنتين للمؤسسة'}</p>
                        <button class="gold-btn" style="width: 100%; justify-content:center;" onclick="addToCart('${prod.id}'); toggleDetailsModal(false);">إضافة المنتج للسلة</button>
                    </div>
                </div>
            `;
            toggleDetailsModal(true);
        };

        window.toggleDetailsModal = function(show) {
            document.getElementById("details-modal").classList.toggle("active", show);
        };

        // Cart Mechanisms
        window.toggleCart = function(show) {
            document.getElementById("cart-drawer").classList.toggle("active", show);
        };

        window.addToCart = function(id) {
            const prod = activeProducts.find(p => p.id === id);
            if(!prod) return;
            const inCart = cart.find(item => item.id === id);
            if (inCart) {
                inCart.qty++;
            } else {
                cart.push({ ...prod, qty: 1 });
            }
            updateCart();
            showToast("تمت إضافة المنتج بنجاح للسلة!");
        };

        function updateCart() {
            const container = document.getElementById("cart-items-container");
            const counter = document.getElementById("cart-counter");
            const totalDisplay = document.getElementById("cart-total-display");
            
            let total = 0;
            let count = 0;
            
            if (cart.length === 0) {
                container.innerHTML = `<p style="text-align: center; color: var(--gray-muted);">السلة فارغة حالياً.</p>`;
            } else {
                container.innerHTML = "";
                cart.forEach((item, idx) => {
                    total += (item.price * item.qty);
                    count += item.qty;
                    container.innerHTML += `
                        <div class="cart-item-row">
                            <div>
                                <h4>${item.name}</h4>
                                <small class="gold-text">${item.price} ر.س × ${item.qty}</small>
                            </div>
                            <i class="fa-solid fa-trash-can" style="color:red; cursor:pointer;" onclick="removeFromCart(${idx})"></i>
                        </div>
                    `;
                });
            }
            counter.innerText = count;
            totalDisplay.innerText = `${total.toFixed(2)} ر.س`;
        }

        window.removeFromCart = function(idx) {
            cart.splice(idx, 1);
            updateCart();
        };

        window.openCheckoutForm = function() {
            if(cart.length === 0) return alert("سلة الشراء فارغة!");
            toggleCart(false);
            toggleCheckoutModal(true);
        };

        window.toggleCheckoutModal = function(show) {
            document.getElementById("checkout-modal").classList.toggle("active", show);
        };

        // Order & E-Invoice Execution
        window.processOrder = async function(e) {
            e.preventDefault();
            const orderId = "ORD-" + Math.floor(100000 + Math.random() * 900000);
            const name = document.getElementById("cust-name").value;
            const phone = document.getElementById("cust-phone").value;
            const email = document.getElementById("cust-email").value;
            const city = document.getElementById("cust-city").value;
            const address = document.getElementById("cust-address").value;
            
            const totalSum = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            const orderObj = {
                orderId,
                customerName: name,
                phone,
                email,
                city,
                address,
                products: cart,
                total: totalSum,
                date: new Date().toLocaleDateString("ar-SA"),
                status: "جديد"
            };

            try {
                // حفظ الطلب في Firebase Realtime Database
                await set(ref(db, `orders/${orderId}`), orderObj);
                showToast("تم إرسال طلبك وحفظه بالنظام بنجاح!");
                
                // الانتقال لعرض الفاتورة الإلكترونية المباشرة للعميل
                generateEInvoice(orderObj);
                cart = [];
                updateCart();
                toggleCheckoutModal(false);
            } catch (err) {
                alert("لم يتم الربط بالفايربيس بالكامل بعد، سيتم عرض الفاتورة تجريبياً.");
                generateEInvoice(orderObj);
                cart = [];
                updateCart();
                toggleCheckoutModal(false);
            }
        };

        function generateEInvoice(order) {
            document.getElementById("customer-main-view").style.display = "none";
            const invoiceScreen = document.getElementById("invoice-screen");
            invoiceScreen.style.display = "block";

            const paper = document.getElementById("invoice-paper-content");
            const tax = order.total * 0.15;
            const grandTotal = order.total + tax;

            paper.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:3px solid var(--gold); padding-bottom:15px;">
                    <div>
                        <h2>فاتورة ضريبية مبسطة</h2>
                        <p>رقم الطلب: <strong>${order.orderId}</strong></p>
                        <p>التاريخ: ${order.date}</p>
                    </div>
                    <div style="text-align:left;">
                        <h3>مؤسسة البقمي للحلول الذكية</h3>
                        <p>الرقم الضريبي: 310005544200003</p>
                    </div>
                </div>
                <div style="margin:20px 0;">
                    <h4>بيانات العميل:</h4>
                    <p>الاسم: ${order.customerName}</p>
                    <p>رقم الجوال: ${order.phone}</p>
                    <p>العنوان: ${order.city} - ${order.address}</p>
                </div>
                <table class="invoice-table">
                    <thead>
                        <tr style="background:#f2f2f2;">
                            <th>المنتج</th>
                            <th>الكمية</th>
                            <th>السعر</th>
                            <th>المجموع</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${order.products.map(item => `
                            <tr>
                                <td>${item.name}</td>
                                <td>${item.qty}</td>
                                <td>${item.price} ر.س</td>
                                <td>${item.price * item.qty} ر.س</td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
                <div style="margin-top:20px; text-align:left; border-top:1px solid #ddd; padding-top:15px;">
                    <p>المجموع (غير شامل الضريبة): <strong>${order.total.toFixed(2)} ر.س</strong></p>
                    <p>ضريبة القيمة المضافة (15%): <strong>${tax.toFixed(2)} ر.س</strong></p>
                    <h3 style="color:var(--gold-hover);">الإجمالي النهائي: ${(grandTotal).toFixed(2)} ر.س</h3>
                </div>
            `;
        }

        window.showHomeView = function() {
            document.getElementById("customer-main-view").style.display = "grid";
            document.getElementById("invoice-screen").style.display = "none";
        };
    </script>
</body>
</html>
