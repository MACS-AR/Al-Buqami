<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Page 1 - Cover</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        @page { size: A4; margin: 0; }
        body { font-family: 'Cairo', sans-serif; margin: 0; padding: 0; width: 210mm; height: 297mm; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #121212; color: #fff; position: relative; box-sizing: border-box; }
        .border-line { position: absolute; top: 15mm; bottom: 15mm; left: 15mm; right: 15mm; border: 2px solid #d4af37; }
        .logo-container { margin-bottom: 25mm; z-index: 2; }
        .logo-container img { height: 35mm; max-width: 80mm; object-fit: contain; }
        .main-title { font-size: 38px; font-weight: 900; color: #f1b317; text-align: center; letter-spacing: 1px; line-height: 1.6; z-index: 2; margin-bottom: 10mm; }
        .sub-title { font-size: 20px; color: #eaeaea; text-align: center; font-weight: bold; z-index: 2; }
    </style>
</head>
<body>
    <div class="border-line"></div>
    <div class="logo-container">
        <img id="dynamicLogo" src="" alt="Logo">
    </div>
    <div class="main-title">عرض فني ومالي متكامل<br>أنظمة التتبع وإدارة الأساطيل الذكية</div>
    <div class="sub-title" id="cName">شركة ومؤسسة البقمي للمقاولات</div>

    <script>
        window.addEventListener('message', function(e) {
            if (e.data.type === 'RENDER_DATA') {
                document.getElementById('dynamicLogo').src = e.data.logoUrl || '';
                document.getElementById('cName').innerText = e.data.customerName || '';
            }
        });
    </script>
</body>
</html>
