<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Page 2 - Customer Specifications</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        @page { size: A4; margin: 0; }
        body { font-family: 'Cairo', sans-serif; margin: 0; padding: 25mm 20mm; width: 210mm; height: 297mm; box-sizing: border-box; background-color: #fff; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eaeaea; padding-bottom: 5mm; }
        .header .web { font-family: Arial; font-size: 14px; color: #666; font-weight: bold; }
        .header img { height: 18mm; max-width: 45mm; object-fit: contain; }
        .title { text-align: center; color: #3a3a3a; font-size: 26px; margin: 20mm 0 10mm 0; font-weight: 700; font-family: Arial, sans-serif; }
        .prop-table { width: 100%; border-collapse: collapse; margin-top: 5mm; }
        .prop-table tr:nth-child(odd) { background-color: #f1b317; }
        .prop-table tr:nth-child(even) { background-color: #ffffff; }
        .prop-table td { padding: 5mm 6mm; font-size: 15px; border: 1px solid #3a3a3a; color: #111; font-weight: bold; }
        .prop-table td.label { text-align: right; width: 45%; color: #222; }
        .prop-table td.value { text-align: left; direction: ltr; font-family: Arial, sans-serif; }
    </style>
</head>
<body>
    <div class="header">
        <span class="web">Website: www.tst-ksa.com</span>
        <img id="dynamicLogo" src="" alt="Logo">
    </div>
    <div class="title">Financial Proposal</div>
    <table class="prop-table">
        <tr><td class="label">Customer Name:</td><td class="value" id="cName">--</td></tr>
        <tr><td class="label">Contact Person:</td><td class="value" id="cPerson">--</td></tr>
        <tr><td class="label">Mobile Number:</td><td class="value" id="cMobile">--</td></tr>
        <tr><td class="label">Email:</td><td class="value" id="cEmail">--</td></tr>
        <tr><td class="label">Offer For Vehicle:</td><td class="value" id="cOffer">--</td></tr>
        <tr><td class="label">Number of Vehicle:</td><td class="value" id="cNum">0</td></tr>
        <tr><td class="label">Sales Consultant:</td><td class="value" id="cSales">--</td></tr>
        <tr><td class="label">Mobile Number:</td><td class="value" id="cSalesMobile">--</td></tr>
        <tr><td class="label">Date:</td><td class="value" id="cDate">--</td></tr>
    </table>
    <script>
        window.addEventListener('message', function(e) {
            if (e.data.type === 'RENDER_DATA') {
                document.getElementById('dynamicLogo').src = e.data.logoUrl || '';
                document.getElementById('cName').innerText = e.data.customerName || '--';
                document.getElementById('cPerson').innerText = e.data.contactPerson || '--';
                document.getElementById('cMobile').innerText = e.data.mobile || '--';
                document.getElementById('cEmail').innerText = e.data.email || '--';
                document.getElementById('cOffer').innerText = e.data.vehicleOffer || '--';
                document.getElementById('cNum').innerText = e.data.vehicleCount || '0';
                document.getElementById('cSales').innerText = e.data.salesConsultant || '--';
                document.getElementById('cSalesMobile').innerText = e.data.salesMobile || '--';
                document.getElementById('cDate').innerText = e.data.date || '--';
            }
        });
    </script>
</body>
</html>
